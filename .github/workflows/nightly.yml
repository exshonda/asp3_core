#
#		Nightly（QEMU 3ターゲットで機能テスト全件）
#
#  設計・経緯は docs/dev/ci.md を参照．PR毎に回すには重いため夜間に分離
#  （workflow_dispatchで手動実行も可能）．
#  全ジョブを開発コンテナイメージで実行（docs/dev/devcontainer.md）．
#  イメージ統一により polarfire も同一マトリクスで実行する
#  （ubuntu:26.04素コンテナの別ジョブだった経緯は docs/dev/ci.md）．
#
#  テスト対象は test/testexec.py TEST_SPEC の機能テスト全件から，
#  ターゲット毎に以下を除外したもの（2026-06-06 開発機での全件実行結果）：
#  - dlynse（全QEMUターゲット）：sil_dly_nseの実時間較正テスト．QEMUは
#    サイクル精度をもたないため成立しない（実機でのみ有意味）
#  - int1（polarfire のみ除外）：PLICはソフト割込み発生（ras_int）非対応
#    （QEMUのSiFive PLICもpendingレジスタ書込みを拒否）＝原理的に非適用．
#    mps2は予備NVIC IRQをソフト割込み源として整備済み（int1実行＝対象）
#  - cpuexc1・cpuexc4（mps2）：CPU例外がHardFaultへエスカレートし
#    Unregistered Exceptionとなる既存挙動（要調査）
#
#  TTSP3 適合性テスト（ttsp3-mps2 ジョブ）：TOPPERSテストスイート TTSP3 の
#  functional 全件を mps2-an505（Cortex-M33）build+run で回す（設計は
#  docs/dev/ttsp3-conformance.md）．TTSP3 は private 別リポジトリのため
#  checkout に **secret `TTSP3_TOKEN`**（exshonda/TTSP3 read 権限の PAT）が要る．
#  ttg が Ruby 依存のため apt で ruby を都度導入する（イメージ非同梱）．
#
name: Nightly

#  CI使用量の削減（2026-06-16）：daily → weekly（日曜のみ）。
#  全件 testexec＋TTSP3 functional/staticAPI（3ターゲット）は重いため、
#  毎日ではなく週次に集約する。緊急時は workflow_dispatch で即時実行可能。
on:
  schedule:
    - cron: '0 18 * * 0'   # 毎週日曜 18:00 UTC = 月曜 03:00 JST
  workflow_dispatch:

jobs:
  testexec-full:
    name: testexec full (${{ matrix.name }})
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/exshonda/asp3_core-dev:20260606
      #  イメージの既定ユーザはvscode（devcontainer用）のため、Actionsの
      #  ランナーファイルに書けるようrootで実行する
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mps2-qemu
            options: --preset mps2_an505-qemu
            run: >-
              timeout 60 qemu-system-arm -machine mps2-an505 -nographic
              -semihosting-config enable=on,target=native -kernel asp.elf
            tests: >-
              cpuexc2 cpuexc3 cpuexc5 cpuexc6 cpuexc7 cpuexc8 cpuexc9 cpuexc10
              dtq1 exttsk flg1 hrt1 int1 mpf1
              mutex1 mutex2 mutex3 mutex4 mutex5 mutex6 mutex7 mutex8
              notify1 pdq1 raster1 raster2 sem1 sem2 suspend1
              sysman1 sysstat1 task1 tmevt1
          - name: zcu102-qemu
            options: --preset zcu102_arm64-qemu
            run: >-
              timeout 60 qemu-system-aarch64 -machine xlnx-zcu102,secure=on
              -nographic -semihosting-config enable=on,target=native
              -kernel asp.elf
            tests: >-
              cpuexc1 cpuexc2 cpuexc3 cpuexc4 cpuexc5 cpuexc6 cpuexc7 cpuexc8
              cpuexc9 cpuexc10
              dtq1 exttsk flg1 hrt1 int1 mpf1
              mutex1 mutex2 mutex3 mutex4 mutex5 mutex6 mutex7 mutex8
              notify1 pdq1 raster1 raster2 sem1 sem2 suspend1
              sysman1 sysstat1 task1 tmevt1
          - name: polarfire-qemu
            options: --preset polarfire_soc_kit-qemu
            run: >-
              timeout 60 qemu-system-riscv64 -machine microchip-icicle-kit
              -nographic -semihosting-config enable=on,target=native
              -bios none -kernel asp.elf
            tests: >-
              cpuexc1 cpuexc2 cpuexc3 cpuexc4 cpuexc5 cpuexc6 cpuexc7 cpuexc8
              cpuexc9 cpuexc10
              dtq1 exttsk flg1 hrt1 mpf1
              mutex1 mutex2 mutex3 mutex4 mutex5 mutex6 mutex7 mutex8
              notify1 pdq1 raster1 raster2 sem1 sem2 suspend1
              sysman1 sysstat1 task1 tmevt1
    steps:
      - uses: actions/checkout@v5
      - name: Function tests (testexec.py)
        run: |
          scripts/ci/run_testexec.py --options "${{ matrix.options }}" \
            --run "${{ matrix.run }}" \
            --workdir build/testexec-${{ matrix.name }} \
            ${{ matrix.tests }}
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-${{ matrix.name }}-logs
          path: build/testexec-${{ matrix.name }}/testexec.log
          if-no-files-found: ignore

  #
  #  TTSP3 適合性テスト：M-profile 3ターゲット（mps2-an505=M33／mps2-an386=M4/v7-M／
  #  mps3-an547=M55/v8.1-M+MVE）で functional 全件 build+run（matrix・fail-fast=false）
  #
  #  - TTSP3（private 別リポジトリ・読み取り専用のテスト供給源）を checkout．
  #    要 secret TTSP3_TOKEN（exshonda/TTSP3 への read 権限 PAT）．
  #  - ttg（Ruby）でテスト生成するため ruby を apt 導入（イメージ非同梱）．
  #  - **gate＝functional（--only yaml）の FAIL 0**（HW依存は driver が SKIP）．
  #    staticAPI のエラー系はターゲット依存の cfg エラーコード差があり
  #    （docs/dev/ttsp3-conformance.md）非gate（continue-on-error）で可視化のみ．
  #  - 全 yaml の逐次 build+run のため重い（nightly 専用）．
  #
  ttsp3-mprofile:
    name: TTSP3 conformance ${{ matrix.label }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: mps2_an505, label: "mps2-an505 (Cortex-M33)" }
          - { target: mps2_an386, label: "mps2-an386 (Cortex-M4/v7-M)" }
          - { target: mps3_an547, label: "mps3-an547 (Cortex-M55/v8.1-M+MVE)" }
    container:
      image: ghcr.io/exshonda/asp3_core-dev:20260606
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Verify TTSP3_TOKEN secret is present
        env:
          TOK: ${{ secrets.TTSP3_TOKEN }}
        run: |
          if [ -z "$TOK" ]; then
            echo "::error::secret TTSP3_TOKEN が空/未検出です。exshonda/asp3_core の Settings → Secrets and variables → Actions の Repository secrets に、名前を厳密に TTSP3_TOKEN として、exshonda/TTSP3 を読める PAT を登録してください。"
            exit 1
          fi
          echo "TTSP3_TOKEN present (length ${#TOK})."
      - name: Checkout TTSP3 (private, read-only test source)
        uses: actions/checkout@v5
        with:
          repository: exshonda/TTSP3
          ref: main
          token: ${{ secrets.TTSP3_TOKEN }}
          path: TTSP3
      - name: Install ruby (ttg)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ruby
          rm -rf /var/lib/apt/lists/*
      - name: TTSP3 functional full (build+run, gate＝FAIL 0)
        run: |
          set -o pipefail
          python3 test/ttsp/run_ttsp.py --target ${{ matrix.target }} --only yaml --tap \
            --build-dir build/ttsp-${{ matrix.target }} \
            --ttsp3-root "$GITHUB_WORKSPACE/TTSP3" api_test/ASP \
            | tee ttsp3-${{ matrix.target }}-functional.tap
      - name: TTSP3 staticAPI (error/runtime, non-gating＝ターゲット依存差あり)
        continue-on-error: true
        run: |
          python3 test/ttsp/run_ttsp.py --target ${{ matrix.target }} --tap \
            --build-dir build/ttsp-${{ matrix.target }}-static \
            --ttsp3-root "$GITHUB_WORKSPACE/TTSP3" api_test/ASP/staticAPI \
            | tee ttsp3-${{ matrix.target }}-staticapi.tap
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-ttsp3-${{ matrix.target }}
          path: |
            ttsp3-${{ matrix.target }}-functional.tap
            ttsp3-${{ matrix.target }}-staticapi.tap
          if-no-files-found: ignore
