/*
 *  コア依存部のコンフィギュレーションファイル（ARM-M用）
 *
 *  SafeG-M: Non-secure 実行を司る BTASK(_SAFEG_BTASK, id=1) を生成する。
 *  本ファイルは target_kernel.cfg から app の .cfg より前に INCLUDE されるため，
 *  _SAFEG_BTASK が最初の CRE_TSK となり TSK id=1 が保証される。
 *
 *  【重要・設計判断(M0確定)】この CRE_TSK を asp3_core 側に置くのは意図的。
 *  core_support.S は BTASK を p_runtsk==&tcb_table[0](=id=1=TMIN_TSKID)で判別する
 *  ため，BTASK は必ず「最初の CRE_TSK」でなければならない。その「app より前」を
 *  構造的に保証できるのは cfg の INCLUDE 順を握る asp3_core 側だけである
 *  (SafeG-M アプリ側に移すと先頭 CRE_TSK 規律への依存となり脆い)。本体
 *  _kernel_deactivate_nonsecure_interrupts / exinf TOPPERS_NS_VTOR も
 *  asp3_core/target 側シンボル。詳細は SafeG-M doc/M0_design_freeze.md §4 補足。
 */
#ifdef TOPPERS_SAFEG_M
CRE_TSK(_SAFEG_BTASK,
        { TA_ACT, TOPPERS_NS_VTOR, _kernel_deactivate_nonsecure_interrupts,
          TMAX_TPRI, DEFAULT_ISTKSZ, NULL });
#endif /* TOPPERS_SAFEG_M */
