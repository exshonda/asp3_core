# SPDX-License-Identifier: GPL-2.0-or-later
#
# TOPPERS/FMP3 STM32MP257F-DK 用 OpenOCD トップ設定
#
# このファイルのあるディレクトリを検索パスに追加し，DK ボード設定を読み込む．
#   board/stm32mp25x_dk.cfg, target/stm32mp25x.cfg ... 同梱（GPL-2.0-or-later, ST 由来）
#   interface/stlink-dap.cfg, target/swj-dp.tcl, mem_helper.tcl ... OpenOCD 同梱版を使用
#
# 使い方:
#   このディレクトリで実行: openocd -f openocd.cfg
#   SMP(PRC_NUM=2) で a35_1 を examine させない場合:
#     openocd -c "set EN_CA35_1 0" -f openocd.cfg

add_script_search_dir [file dirname [info script]]
source [find board/stm32mp25x_dk.cfg]
