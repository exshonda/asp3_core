/*
 *		シリアルインタフェースドライバのターゲット依存部（ARM MPS2-AN386用）
 *		のコンフィギュレーションファイル（非TECS版専用）
 *
 *  AN386 の UART は combined 割込みを持たず，TX / RX が別々の NVIC 線に
 *  割り当てられる．送信可能通知（TX）と受信通知（RX）の双方を SIO ドライバ
 *  が必要とするため，同一の ISR（sio_isr）を両割込みに登録する．
 */

#include "target_serial.h"
/* sio_initializeはtarget_initializeから呼び出すため，ATT_INIは不要 */
/* ATT_INI({ TA_NULL, 0, sio_initialize }); */
ATT_TER({ TA_NULL, 0, sio_terminate });
CFG_INT(INTNO_SIO_RX, { INTATR_SIO, INTPRI_SIO });
CFG_INT(INTNO_SIO_TX, { INTATR_SIO, INTPRI_SIO });
CRE_ISR(ISR_SIO_RX, { TA_NULL, 1, INTNO_SIO_RX, sio_isr, ISRPRI_SIO });
CRE_ISR(ISR_SIO_TX, { TA_NULL, 1, INTNO_SIO_TX, sio_isr, ISRPRI_SIO });
